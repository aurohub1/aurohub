<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sem conexão — Aurohub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #060B16;
      color: #e6edf3;
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align: center;
      gap: 24px;
    }
    img { width: 120px; opacity: 0.9; }
    h1 { font-size: 22px; font-weight: 700; color: #e6edf3; }
    p  { font-size: 14px; color: #8b949e; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px;
      padding: 10px 28px;
      border-radius: 8px;
      border: none;
      background: #FF7A1A;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <img src="/logo-laranja.png" alt="Aurohub" />
  <h1>Sem conexão</h1>
  <p>Verifique sua internet e tente novamente.</p>
  <button onclick="location.reload()">Tentar novamente</button>
</body>
</html>
